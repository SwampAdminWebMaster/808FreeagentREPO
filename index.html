<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>808 MAFIA OS • v4.20</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0012;
      --matrix: #00ff41;
      --neon-cyan: #00f5ff;
      --neon-purple: #c300ff;
      --neon-red: #ff0044;
      --panel: rgba(12, 5, 22, 0.85);
      --border: rgba(0, 245, 255, 0.2);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      height: 100vh;
      background: var(--bg);
      color: #e0e0ff;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }
    canvas#matrix { position:fixed; inset:0; z-index:1; opacity:0.45; }

    /* Boot screen */
    #boot-screen {
      position: fixed; inset:0; background:black; z-index:9999;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      color: var(--matrix); font-family:'Orbitron',sans-serif; font-size:2.2rem; letter-spacing:8px;
    }
    #boot-progress { margin-top:60px; width:420px; height:14px; background:#111; border:2px solid var(--matrix); }
    #boot-bar { height:100%; width:0%; background:linear-gradient(90deg,#00ff41,#00aa30); transition:width 3.8s ease-out; }

    /* Login */
    #login-screen {
      position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:9000; display:none;
      flex-direction:column; align-items:center; justify-content:center;
    }
    .login-box {
      background:var(--panel); border:1px solid var(--border); border-radius:6px;
      padding:3rem 4rem; width:420px; text-align:center; box-shadow:0 0 60px rgba(0,245,255,0.15);
    }
    input { background:#0a0a14; border:1px solid #333366; color:var(--neon-cyan); padding:12px 16px; width:100%; margin:12px 0; font-size:1.1rem; }
    button { background:transparent; border:2px solid var(--neon-cyan); color:var(--neon-cyan); padding:12px 36px; font-family:'Orbitron',sans-serif; font-size:1.1rem; cursor:pointer; margin-top:1.5rem; }
    button:hover { background:rgba(0,245,255,0.14); box-shadow:0 0 25px var(--neon-cyan); }

    /* Desktop */
    #desktop { display:none; height:100vh; position:relative; z-index:10; }
    .icon {
      position:absolute; width:82px; text-align:center; color:white; font-size:0.82rem; line-height:1.15;
      cursor:pointer; user-select:none;
    }
    .icon .emoji { font-size:2.8rem; display:block; margin:0 auto 4px; }
    .icon:hover { background:rgba(80,60,140,0.35); border-radius:6px; }

    /* Taskbar */
    #taskbar {
      position:fixed; bottom:0; left:0; right:0; height:38px; background:rgba(8,4,18,0.9);
      border-top:1px solid var(--border); display:flex; align-items:center; padding:0 16px; z-index:200;
    }
    #start-btn { background:transparent; border:1px solid var(--neon-purple); color:var(--neon-purple); padding:6px 18px; font-family:'Orbitron',sans-serif; cursor:pointer; }
    #clock { margin-left:auto; color:#aaa; }

    /* Window */
    .window {
      position:absolute; background:var(--panel); border:1px solid var(--border); border-radius:6px;
      box-shadow:0 0 40px rgba(0,0,0,0.8); overflow:hidden; z-index:100; min-width:300px; min-height:200px;
    }
    .titlebar { background:linear-gradient(#1a0033,#0f001a); padding:8px 12px; display:flex; justify-content:space-between; cursor:move; }
    .title { font-family:'Orbitron',sans-serif; color:var(--neon-cyan); letter-spacing:1px; }
    .controls button { width:18px; height:18px; border-radius:50%; margin-left:8px; border:none; cursor:pointer; }
    .close { background:#ff5f56; }
    .content { padding:16px; height:calc(100% - 36px); overflow:auto; }
  </style>
</head>
<body>

<canvas id="matrix"></canvas>

<!-- Boot -->
<div id="boot-screen">
  808 MAFIA OS
  <div id="boot-progress"><div id="boot-bar"></div></div>
</div>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h2 style="color:var(--neon-purple);margin-bottom:2rem;">AGENT AUTHENTICATION</h2>
    <input type="email" id="agent-email" placeholder="EMAIL" autocomplete="off"/>
    <input type="text" id="agent-id" placeholder="AGENT ID" readonly/>
    <button onclick="login()">ENTER SYSTEM</button>
  </div>
</div>

<!-- Desktop -->
<div id="desktop">

  <!-- Desktop Icons -->
  <div class="icon" style="left:50px;top:50px;" ondblclick="openEventDocs()">
    <div class="emoji">📁</div>
    <div>Event Docs</div>
  </div>

  <div class="icon" style="left:50px;top:200px;">
    <div class="emoji">🎵</div>
    <div>SoundCloud</div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button id="start-btn">START</button>
    <div id="clock"></div>
  </div>
</div>

<!-- Password Modal for Drip Fest Pitch Deck -->
<div id="pitch-pwd-modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;display:none;align-items:center;justify-content:center;">
  <div style="background:#1a0033;border:2px solid #ff0044;padding:40px 50px;border-radius:8px;width:380px;text-align:center;">
    <h2 style="color:#ff6666;">🔒 DRIP-FEST-PITCH.EXE</h2>
    <p style="margin:20px 0;color:#ff9999;">Enter access code to unlock pitch deck:</p>
    <input type="password" id="pitch-code" placeholder="••••••" style="width:100%;padding:12px;font-size:1.3rem;text-align:center;background:#0a0a14;border:1px solid #660033;color:#ffcccc;"/>
    <br><br>
    <button onclick="checkPitchPassword()" style="padding:12px 40px;background:transparent;border:2px solid #ff0044;color:#ff6666;font-family:Orbitron,sans-serif;cursor:pointer;">AUTHENTICATE</button>
  </div>
</div>

<script>
// Matrix rain
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン█▓▒░';
const fontSize = 16;
const columns = canvas.width/fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = 'rgba(10,0,18,0.05)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#00ff41';
  ctx.font = fontSize + 'px monospace';
  for(let i=0;i<drops.length;i++){
    const text = chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);
    if(drops[i]*fontSize > canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  }
}
setInterval(draw,35);
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

// Boot sequence
window.onload = () => {
  document.getElementById('boot-bar').style.width = '100%';
  setTimeout(()=>{ 
    document.getElementById('boot-screen').style.opacity = '0';
    setTimeout(()=>{ 
      document.getElementById('boot-screen').style.display='none';
      document.getElementById('login-screen').style.display='flex';
    },1200);
  },3800);
};

// Login
function login(){
  const email = document.getElementById('agent-email').value.trim();
  if(!email) return alert("Enter email");
  document.getElementById('agent-id').value = 'A-' + Math.floor(100000 + Math.random()*900000);
  setTimeout(()=>{
    document.getElementById('login-screen').style.display='none';
    document.getElementById('desktop').style.display='block';
    updateClock();
    setInterval(updateClock,1000);
  },600);
}

// Clock
function updateClock(){
  const d = new Date();
  document.getElementById('clock').textContent = d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

// Open Event Docs folder (demo alert + protected file)
function openEventDocs(){
  if(confirm("Event Docs opened.\n\nFiles:\n• Mission_Statement.pdf\n• Contact_List.xlsx\n• drip-fest-pitch.exe  🔒\n\nDouble-click the .exe to open pitch deck.")){
    // In a full version you would show a modal folder here
    // For now we directly offer the protected pitch deck
    document.getElementById('pitch-pwd-modal').style.display = 'flex';
  }
}

// Password check → open pitch deck in NEW TAB
function checkPitchPassword(){
  const code = document.getElementById('pitch-code').value.trim();
  if(code === '808'){
    document.getElementById('pitch-pwd-modal').style.display = 'none';
    window.open('drip-fest-pitch.html', '_blank');
  } else {
    alert("ACCESS DENIED — Incorrect code.");
  }
}
</script>
</body>
</html>
