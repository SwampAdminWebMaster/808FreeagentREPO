<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>808 Mafia OS Desktop Interface</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js"></script>
</head>
<body>
    <div id="desktop">
        <!-- Existing desktop features, icons, animations, and functionality will go here -->
        <script>
          const modal = document.createElement('div');
          modal.id = 'pitchDeckModal';
          modal.style.display = 'none';
          document.body.appendChild(modal);

          function showModal() {
              modal.style.display = 'block';
              const iframe = document.createElement('iframe');
              iframe.src = 'drip-fest-pitch.html';
              modal.appendChild(iframe);
              const audio = new Audio('drip-fest-bgm.mp3');
              audio.play();
          }

          // Simulating password protection
          const password = prompt('Enter the password to access DripFest Pitch Deck:');
          if(password === '808') {
              showModal();
          } else {
              alert('Incorrect password!');
          }
        </script>
    </div>
</body>
</html>
